events { worker_connections 1024; }

http {
    upstream go_api    { server go-api:8080; }
    upstream python_ml { server python-ml:8000; }

    server {
        listen 80;

        location /api/ {
            proxy_pass http://go_api;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # AFTER (correct — strips the /ml/ prefix before forwarding)
        location /ml/ {
            proxy_pass http://python_ml/;
        }
    }
}


